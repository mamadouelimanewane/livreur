name: Build Android APKs

on:
  workflow_dispatch:
    inputs:
      target:
        description: "APK target variant"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - user
          - driver

jobs:
  prepare:
    name: Select APK targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Build target matrix
        id: set-matrix
        shell: bash
        run: |
          case "${{ github.event.inputs.target }}" in
            user)
              echo 'matrix={"include":[{"target":"user","label":"client","app_name":"LiviGo Utilisateur"}]}' >> "$GITHUB_OUTPUT"
              ;;
            driver)
              echo 'matrix={"include":[{"target":"driver","label":"driver","app_name":"LiviGo Conducteur"}]}' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'matrix={"include":[{"target":"user","label":"client","app_name":"LiviGo Utilisateur"},{"target":"driver","label":"driver","app_name":"LiviGo Conducteur"}]}' >> "$GITHUB_OUTPUT"
              ;;
          esac

  build:
    name: Build ${{ matrix.app_name }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure target (${{ matrix.target }})
        run: node scripts/mobileify.js ${{ matrix.target }}

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk "artifacts/LiviGo-${{ matrix.label }}-debug.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiviGo-${{ matrix.label }}-debug
          path: artifacts/LiviGo-${{ matrix.label }}-debug.apk
          retention-days: 30
