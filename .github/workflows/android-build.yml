name: Build Android APKs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      target:
        description: "APK target variant"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - user
          - driver
          - admin
      build_type:
        description: "APK build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  prepare:
    name: Select APK targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Build target matrix
        id: set-matrix
        shell: bash
        run: |
          case "${{ github.event.inputs.target }}" in
            user)
              echo 'matrix={"include":[{"target":"user","label":"client","app_name":"LiviGo Utilisateur"}]}' >> "$GITHUB_OUTPUT"
              ;;
            driver)
              echo 'matrix={"include":[{"target":"driver","label":"driver","app_name":"LiviGo Conducteur"}]}' >> "$GITHUB_OUTPUT"
              ;;
            admin)
              echo 'matrix={"include":[{"target":"admin","label":"admin","app_name":"LiviGo Admin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'matrix={"include":[{"target":"user","label":"client","app_name":"LiviGo Utilisateur"},{"target":"driver","label":"driver","app_name":"LiviGo Conducteur"},{"target":"admin","label":"admin","app_name":"LiviGo Admin"}]}' >> "$GITHUB_OUTPUT"
              ;;
          esac

  build:
    name: Build ${{ matrix.app_name }} (${{ github.event.inputs.build_type }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up Android SDK
        shell: bash
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | head -n 1)"
          fi

          if [ -z "${SDKMANAGER:-}" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "::error::sdkmanager not found in $ANDROID_HOME"
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Configure target (${{ matrix.target }})
        run: node scripts/mobileify.js ${{ matrix.target }}

      - name: Build web assets
        run: npm run build

      - name: Generate Android platform
        shell: bash
        run: |
          if [ -d android ]; then
            npx cap sync android
          else
            npx cap add android
          fi

      - name: Validate release signing secrets
        if: ${{ github.event.inputs.build_type == 'release' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for var in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing GitHub secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare release keystore
        if: ${{ github.event.inputs.build_type == 'release' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/livigo-release.keystore"

      - name: Configure Android release signing
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/livigo-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: node scripts/configure-android-signing.js

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        id: build_apk
        working-directory: android
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --stacktrace --no-daemon 2>&1 | tee ../gradle-build.log
          else
            ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee ../gradle-build.log
          fi

      - name: Show Gradle failure log
        if: ${{ steps.build_apk.outcome == 'failure' }}
        shell: bash
        run: |
          echo "Gradle build failed. Last 200 log lines:"
          tail -n 200 gradle-build.log
          exit 1

      - name: Upload Gradle log
        if: ${{ always() && hashFiles('gradle-build.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log-${{ matrix.label }}-${{ github.event.inputs.build_type }}
          path: gradle-build.log
          retention-days: 7

      - name: Rename APK
        if: ${{ steps.build_apk.outcome == 'success' }}
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk "artifacts/LiviGo-${{ matrix.label }}-release.apk"
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk "artifacts/LiviGo-${{ matrix.label }}-debug.apk"
          fi

      - name: Upload APK
        if: ${{ steps.build_apk.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: LiviGo-${{ matrix.label }}-${{ github.event.inputs.build_type }}
          path: artifacts/LiviGo-${{ matrix.label }}-${{ github.event.inputs.build_type }}.apk
          retention-days: 30
