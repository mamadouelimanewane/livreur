name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'APK target variant'
        required: true
        default: 'user'
        type: choice
        options:
          - user
          - driver

jobs:
  build:
    name: Build ${{ github.event.inputs.target }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure target (${{ github.event.inputs.target }})
        run: node scripts/mobileify.js ${{ github.event.inputs.target }}

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SUR-${{ github.event.inputs.target }}-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
